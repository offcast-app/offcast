name: offcast
description: YouTube channels, experienced like podcasts.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 오디오 재생
  just_audio: ^0.9.40
  audio_service: ^0.18.15

  # 백그라운드 작업
  workmanager: ^0.5.2

  # 네트워크/와이파이
  connectivity_plus: ^6.0.5
  http: ^1.2.2

  # XML 파싱 (YouTube RSS)
  xml: ^6.5.0

  # 데이터베이스
  drift: ^2.21.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.0

  # 파일 시스템
  path_provider: ^2.1.4
  path: ^1.9.0

  # Android 공유 인텐트
  receive_sharing_intent: ^1.8.0

  # 영상 재생 (480p 옵션)
  video_player: ^2.9.2

  # 상태 관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: 2.3.5

  # 네비게이션
  go_router: ^14.3.0

  # 기타 유틸
  intl: ^0.19.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.21.0
  riverpod_generator: 2.4.3

dependency_overrides:
  meta: 1.15.0
  analyzer: 6.5.0
  riverpod_analyzer_utils: 0.5.4
  custom_lint_core: 0.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/binaries/yt-dlp
